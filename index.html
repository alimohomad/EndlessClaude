<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0D0D0D;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 60px;
            background-color: #0A0A0A;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #1F1F1F;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            color: #888888;
            transition: all 0.2s;
            border-radius: 8px;
            position: relative;
        }

        .sidebar-icon:hover {
            background-color: #222222;
            color: #FFFFFF;
        }

        .sidebar-icon.active {
            color: #FF7A45;
        }

        .sidebar-icon.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .sidebar-icon.locked:hover {
            background-color: transparent;
            color: #888888;
        }

        .lock-icon {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background-color: #FF7A45;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }

        .sidebar-bottom {
            margin-top: auto;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* Welcome Section */
        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 40px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            fill: #FF7A45;
            opacity: 0.9;
            transform: scale(0.9);
        }

        .welcome-text {
            font-size: 32px;
            font-weight: 400;
            color: #FFFFFF;
            letter-spacing: 0.3px;
            font-family: 'Charter', Georgia, 'Times New Roman', serif;
        }

        /* Input Box */
        .input-container {
            width: 100%;
            max-width: 700px;
            background: #1E1E1E;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            transition: all 0.2s;
            box-shadow: 0 0 0 1px #2C2C2C;
        }

        .input-container:focus-within {
            box-shadow: 0 0 0 1px #FF7A45, 0 0 0 3px rgba(255, 122, 69, 0.15);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-icon {
            width: 24px;
            height: 24px;
            color: #888888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-icon:hover {
            color: #FFFFFF;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #FFFFFF;
            font-size: 16px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .input-field::placeholder {
            color: #666666;
            font-weight: 400;
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-selector {
            background-color: transparent;
            border: none;
            color: #888888;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .model-selector:hover {
            color: #B3B3B3;
        }

        /* Wave Icon */
        .wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .wave span {
            display: inline-block;
            width: 2px;
            background: #888888;
            border-radius: 2px;
            animation: wave 1.2s infinite ease-in-out;
        }

        .wave span:nth-child(1) {
            height: 8px;
            animation-delay: 0s;
        }

        .wave span:nth-child(2) {
            height: 14px;
            animation-delay: 0.1s;
        }

        .wave span:nth-child(3) {
            height: 10px;
            animation-delay: 0.2s;
        }

        .wave span:nth-child(4) {
            height: 12px;
            animation-delay: 0.3s;
        }

        @keyframes wave {
            0%, 100% {
                transform: scaleY(0.7);
            }
            50% {
                transform: scaleY(1.3);
            }
        }

        /* Quick Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #333333;
            color: #B3B3B3;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .action-btn:hover {
            border-color: #555555;
            color: #FFFFFF;
        }

        .action-btn i {
            width: 16px;
            height: 16px;
            stroke: #B3B3B3;
        }

        .action-btn:hover i {
            stroke: #FFFFFF;
        }

        /* Send Button */
        .send-button {
            width: 36px;
            height: 36px;
            background-color: #FF7A45;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #FFFFFF;
        }

        .send-button:hover {
            background-color: #FF8F5A;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            background-color: #FF7A45;
            margin-left: 20%;
        }

        .message.ai {
            background-color: #1E1E1E;
            margin-right: 20%;
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0D0D0D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            text-align: center;
            padding: 40px;
            background-color: #1E1E1E;
            border-radius: 20px;
            box-shadow: 0 0 0 1px #2C2C2C;
            max-width: 400px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            fill: #FF7A45;
            opacity: 0.9;
        }

        .login-title {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
            font-family: 'Charter', Georgia, 'Times New Roman', serif;
        }

        .login-subtitle {
            font-size: 16px;
            color: #B3B3B3;
            margin-bottom: 30px;
        }

        .login-button {
            background-color: #FF7A45;
            color: #FFFFFF;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .login-button:hover {
            background-color: #FF8F5A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 122, 69, 0.3);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .main-container.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #888888;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>

    <script>
        let isAuthenticated = false;
        let chatHistory = [];

        // Handle login button click
        async function handleLogin() {
            const loginButton = document.getElementById('loginButton');
            loginButton.disabled = true;
            loginButton.innerHTML = '<span class="loading"></span><span class="loading" style="margin-left: 8px;"></span><span class="loading" style="margin-left: 8px;"></span>';

            try {
                await puter.auth.signIn();
                const user = await puter.auth.getUser();
                
                if (user) {
                    isAuthenticated = true;
                    showMainInterface();
                }
            } catch (error) {
                console.error('Authentication error:', error);
                loginButton.disabled = false;
                loginButton.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Sign in with Puter
                `;
                alert('Login failed. Please try again.');
            }
        }

        function showMainInterface() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            enableChat();
        }

        function enableChat() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            messageInput.disabled = false;
            sendButton.disabled = false;
        }

        function addMessage(content, isUser = false) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            chatHistory.push({ role: isUser ? 'user' : 'assistant', content });
        }

        function showLoading() {
            const messagesContainer = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = '<div class="message-content"><span class="loading"></span><span class="loading" style="margin-left: 8px;"></span><span class="loading" style="margin-left: 8px;"></span></div>';
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoading() {
            const loadingDiv = document.getElementById('loadingMessage');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const message = messageInput.value.trim();

            if (!message || !isAuthenticated) return;

            // Add user message
            addMessage(message, true);
            messageInput.value = '';
            sendButton.disabled = true;

            // Show loading
            showLoading();

            try {
                // Call Puter AI with Claude Sonnet
                const response = await puter.ai.chat(message, {
                    model: 'claude-sonnet',
                    stream: true
                });

                removeLoading();
                let fullResponse = '';

                // Stream the response
                for await (const part of response) {
                    fullResponse += part?.text || '';
                }

                addMessage(fullResponse, false);
            } catch (error) {
                removeLoading();
                addMessage(`Error: ${error.message}`, false);
                console.error('Chat error:', error);
            } finally {
                sendButton.disabled = false;
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already authenticated
            puter.auth.getUser().then(user => {
                if (user) {
                    isAuthenticated = true;
                    showMainInterface();
                }
            }).catch(() => {
                // User not authenticated, show login screen
            });

            // Initialize Lucide icons
            lucide.createIcons();
        });

        // Add event listeners after DOM is loaded
        window.addEventListener('load', () => {
            const sendButton = document.getElementById('sendButton');
            const messageInput = document.getElementById('messageInput');
            
            if (sendButton) {
                sendButton.addEventListener('click', sendMessage);
            }
            
            if (messageInput) {
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        });
    </script>
</body>
</html>
