<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D0D;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .claude-logo {
            font-family: 'Source Serif 4', serif;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
            cursor: pointer;
            font-size: 14px;
            color: #b4b4b4;
        }

        .sidebar-item:hover {
            background-color: #202020;
            color: #ffffff;
        }

        .active-item {
            background-color: #202020;
            color: #ffffff;
        }

        .section-label {
            font-size: 12px;
            font-weight: 500;
            color: #666666;
            margin: 24px 12px 8px 12px;
        }

        .recent-item {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            color: #b4b4b4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recent-item:hover {
            background-color: #202020;
            color: #ffffff;
        }

        /* Scrollbar styling */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .sidebar-top {
            padding: 16px;
            border-bottom: 1px solid #2A2A2A;
            flex-shrink: 0;
        }

        .sidebar-bottom {
            margin-top: auto;
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 16px 0;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 400;
            color: #FFFFFF;
            font-family: 'Charter', Georgia, 'Times New Roman', serif;
        }

        .sidebar-nav {
            padding: 0;
            margin-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin-bottom: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #B3B3B3;
            font-size: 14px;
            font-weight: 400;
            user-select: none;
        }

        .nav-item span {
            flex: 1;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
        }

        .nav-item i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .sidebar-section {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            min-height: 0;
        }

        .section-title {
            font-size: 11px;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0;
            font-weight: 500;
        }

        .sidebar-header {
            margin-bottom: 0;
        }

        .new-chat-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: #B3B3B3;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
        }

        .new-chat-btn i {
            width: 18px;
            height: 18px;
        }

        .chat-list {
            overflow-y: auto;
            padding: 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: #B3B3B3;
            font-size: 14px;
            position: relative;
            user-select: none;
        }

        .chat-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
        }

        .chat-item:hover .chat-options {
            opacity: 1;
            visibility: visible;
        }

        .chat-item.active {
            background-color: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
        }

        .chat-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 32px;
        }

        .chat-options {
            opacity: 0;
            visibility: hidden;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s, visibility 0.2s;
            position: absolute;
            right: 8px;
            background-color: #171717;
        }

        .chat-options:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #2A2A2A;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
            background-color: #171717;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #E5E5E5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #171717;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #2A2A2A;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #E5E5E5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #171717;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 14px;
            color: #FFFFFF;
            font-weight: 500;
            white-space: nowrap;
            overflow: visible;
        }

        .user-plan {
            font-size: 12px;
            color: #666666;
            white-space: nowrap;
            overflow: visible;
        }

        .footer-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .footer-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #B3B3B3;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .footer-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
        }

        .footer-btn i {
            width: 16px;
            height: 16px;
        }

        /* Sidebar */
        .sidebar {
            width: 60px;
            background-color: #0A0A0A;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #1F1F1F;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            color: #888888;
            transition: all 0.2s;
            border-radius: 8px;
            position: relative;
        }

        .sidebar-icon:hover {
            background-color: #222222;
            color: #FFFFFF;
        }

        .sidebar-icon.active {
            color: #FF7A45;
        }

        .sidebar-icon.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .sidebar-icon.locked:hover {
            background-color: transparent;
            color: #888888;
        }

        .lock-icon {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background-color: #FF7A45;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }

        .sidebar-bottom {
            margin-top: auto;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Welcome Section */
        .welcome-section {
            text-align: center;
            padding: 60px 20px;
            transition: all 0.3s;
        }

        .welcome-section.hidden {
            display: none;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            fill: #FF7A45;
            opacity: 0.9;
            transform: scale(0.9);
        }

        .welcome-text {
            font-size: 32px;
            font-weight: 400;
            color: #FFFFFF;
            letter-spacing: 0.3px;
            font-family: 'Charter', Georgia, 'Times New Roman', serif;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 140px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* Chat Messages */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
            max-width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
            gap: 8px;
        }

        .message-icon {
            width: 24px;
            height: 24px;
            fill: #FF7A45;
            opacity: 0.9;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .bubble {
            max-width: fit-content;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .user .bubble {
            background-color: #2F2F2F !important;
            color: #FFFFFF !important;
            border-radius: 18px;
            max-width: 500px;
        }

        .ai .bubble {
            background-color: transparent !important;
            color: #E5E5E5;
            padding: 0;
            max-width: 100%;
        }

        /* Hide scrollbars */
        .chat-container::-webkit-scrollbar,
        .sidebar-section::-webkit-scrollbar,
        .chat-list::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .chat-container,
        .sidebar-section,
        .chat-list {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Code blocks */
        .bubble pre {
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            margin: 12px 0;
            max-width: 100%;
            position: relative;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background-color: #0D0D0D;
            border-bottom: 1px solid #2A2A2A;
        }

        .code-language {
            font-size: 12px;
            color: #888888;
            font-family: 'Inter', system-ui, sans-serif;
            text-transform: lowercase;
        }

        .copy-button {
            background: transparent;
            border: none;
            color: #888888;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-button:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
        }

        .bubble code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #E5E5E5;
        }

        .bubble pre code {
            display: block;
            padding: 16px;
            overflow-x: auto;
            white-space: pre;
        }

        .bubble :not(pre) > code {
            background-color: #2A2A2A;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            white-space: normal;
        }

        /* Markdown formatting */
        .bubble strong {
            font-weight: 600;
            color: #FFFFFF;
        }

        .bubble em {
            font-style: italic;
            color: #E5E5E5;
        }

        .bubble h1, .bubble h2, .bubble h3 {
            color: #FFFFFF;
            margin: 16px 0 8px 0;
            font-weight: 600;
        }

        .bubble h1 {
            font-size: 24px;
        }

        .bubble h2 {
            font-size: 20px;
        }

        .bubble h3 {
            font-size: 18px;
        }

        .bubble strong {
            font-weight: 600;
            color: #FFFFFF;
        }

        .bubble p {
            margin: 8px 0;
        }

        .bubble ul, .bubble ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .bubble li {
            margin: 4px 0;
        }

        /* Input Container */
        .input-container {
            position: fixed;
            bottom: 20px;
            left: 320px;
            right: 20px;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            background: #1E1E1E;
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0 0 0 1px #2C2C2C;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-icon {
            width: 24px;
            height: 24px;
            color: #888888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-icon:hover {
            color: #FFFFFF;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #FFFFFF;
            font-size: 15px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .input-field::placeholder {
            color: #666666;
            font-weight: 400;
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-selector {
            background-color: transparent;
            border: none;
            color: #888888;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .model-selector:hover {
            color: #B3B3B3;
        }

        /* Wave Icon */
        .wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .wave span {
            display: inline-block;
            width: 2px;
            background: #888888;
            border-radius: 2px;
            animation: wave 1.2s infinite ease-in-out;
        }

        .wave span:nth-child(1) {
            height: 8px;
            animation-delay: 0s;
        }

        .wave span:nth-child(2) {
            height: 14px;
            animation-delay: 0.1s;
        }

        .wave span:nth-child(3) {
            height: 10px;
            animation-delay: 0.2s;
        }

        .wave span:nth-child(4) {
            height: 12px;
            animation-delay: 0.3s;
        }

        @keyframes wave {
            0%, 100% {
                transform: scaleY(0.7);
            }
            50% {
                transform: scaleY(1.3);
            }
        }

        /* Quick Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px 16px;
            transition: all 0.3s;
        }

        .action-buttons.hidden {
            display: none;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #333333;
            color: #B3B3B3;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .action-btn:hover {
            border-color: #555555;
            color: #FFFFFF;
        }

        .action-btn i {
            width: 14px;
            height: 14px;
            stroke: #B3B3B3;
        }

        .action-btn:hover i {
            stroke: #FFFFFF;
        }

        /* Send Button */
        .send-button {
            width: 36px;
            height: 36px;
            background-color: #FF7A45;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #FFFFFF;
        }

        .send-button:hover {
            background-color: #FF8F5A;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0D0D0D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            text-align: center;
            padding: 40px;
            background-color: #1E1E1E;
            border-radius: 20px;
            box-shadow: 0 0 0 1px #2C2C2C;
            max-width: 400px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            fill: #FF7A45;
            opacity: 0.9;
        }

        .login-title {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
            font-family: 'Charter', Georgia, 'Times New Roman', serif;
        }

        .login-subtitle {
            font-size: 16px;
            color: #B3B3B3;
            margin-bottom: 30px;
        }

        .login-button {
            background-color: #FF7A45;
            color: #FFFFFF;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .login-button:hover {
            background-color: #FF8F5A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 122, 69, 0.3);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .main-content.hidden {
            display: none;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #888888;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transition: left 0.3s ease;
            }

            .sidebar.mobile-open {
                left: 0;
            }

            .mobile-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }

            .mobile-overlay.active {
                display: block;
            }

            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 20px;
                background-color: #171717;
                border-bottom: 1px solid #2A2A2A;
                position: fixed;
                top: 0;
                left: 0;

    <script>
        let isAuthenticated = false;
        let allChats = [];
        let currentChatId = null;

        // Handle login button click
        async function handleLogin() {
            const loginButton = document.getElementById('loginButton');
            loginButton.disabled = true;
            loginButton.innerHTML = '<span class="loading"></span><span class="loading" style="margin-left: 8px;"></span><span class="loading" style="margin-left: 8px;"></span>';

            try {
                await puter.auth.signIn();
                const user = await puter.auth.getUser();
                
                if (user) {
                    isAuthenticated = true;
                    showMainInterface();
                    loadChatsFromStorage();
                }
            } catch (error) {
                console.error('Authentication error:', error);
                loginButton.disabled = false;
                loginButton.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Sign in with Puter
                `;
                alert('Login failed. Please try again.');
            }
        }

        function showMainInterface() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            enableChat();
        }

        function enableChat() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            messageInput.disabled = false;
            sendButton.disabled = false;
        }

        function startNewChat() {
            const newChat = {
                id: Date.now().toString(),
                messages: [],
                title: 'New chat'
            };
            allChats.push(newChat);
            loadChat(newChat.id);
            saveChatsToStorage();
            updateChatList();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = allChats.find(c => c.id === chatId);
            if (chat) {
                displayMessages(chat.messages);
                updateChatList();
                
                // Hide welcome if chat has messages
                if (chat.messages.length > 0) {
                    document.getElementById('welcomeSection').classList.add('hidden');
                    document.getElementById('actionButtons').classList.add('hidden');
                } else {
                    document.getElementById('welcomeSection').classList.remove('hidden');
                    document.getElementById('actionButtons').classList.remove('hidden');
                }
            }
        }

        function updateChatList() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';
            
            allChats.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = `recent-item ${chat.id === currentChatId ? 'active-item' : ''}`;
                
                const firstMessage = chat.messages[0]?.content || 'New Chat';
                const truncatedMessage = firstMessage.substring(0, 30) + (firstMessage.length > 30 ? '...' : '');
                
                chatItem.innerHTML = `
                    <span class="truncate">${truncatedMessage}</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                        <circle cx="12" cy="12" r="1"/>
                        <circle cx="19" cy="12" r="1"/>
                        <circle cx="5" cy="12" r="1"/>
                    </svg>
                `;
                
                chatItem.onclick = (e) => {
                    if (!e.target.closest('svg')) {
                        loadChat(chat.id);
                    } else {
                        if (confirm('Delete this chat?')) {
                            deleteChat(chat.id);
                        }
                    }
                };
                
                chatList.appendChild(chatItem);
            });
        }

        function deleteChat(chatId) {
            allChats = allChats.filter(c => c.id !== chatId);
            if (chatId === currentChatId) {
                if (allChats.length > 0) {
                    loadChat(allChats[allChats.length - 1].id);
                } else {
                    startNewChat();
                }
            }
            saveChatsToStorage();
            updateChatList();
        }

        function displayMessages(messages) {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            
            messages.forEach(msg => {
                addMessageToDOM(msg.content, msg.isUser);
            });
        }

        function addMessageToDOM(content, isUser = false) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            if (!isUser) {
                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                icon.setAttribute('class', 'message-icon');
                icon.setAttribute('viewBox', '0 0 100 100');

                messageDiv.appendChild(icon);
            }
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // Format content with markdown parser
            const formattedContent = formatMessageContent(content);
            bubble.innerHTML = formattedContent;
            
            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            
            // Apply syntax highlighting to code blocks
            if (!isUser) {
                bubble.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
            
            messagesContainer.parentElement.scrollTop = messagesContainer.parentElement.scrollHeight;
        }

        function formatMessageContent(content) {
            // Use marked.js to parse markdown to HTML
            const html = marked.parse(content);
            return html;
        }

        function copyCode(codeId) {
            const codeElement = document.getElementById(codeId);
            const text = codeElement.textContent;
            navigator.clipboard.writeText(text).then(() => {
                // Show copied feedback
                const button = event.target.closest('.copy-button');
                const originalHTML = button.innerHTML;
                button.innerHTML = '<span style="color: #4CAF50;">✓ Copied</span>';
                setTimeout(() => {
                    button.innerHTML = originalHTML;
                }, 2000);
            });
        }

        function addMessage(content, isUser = false) {
            const chat = allChats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages.push({ content, isUser });
                
                // Update chat title with first message
                if (chat.messages.length === 1 && isUser) {
                    chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                }
                
                // Hide welcome after first message
                if (chat.messages.length > 0) {
                    document.getElementById('welcomeSection').classList.add('hidden');
                    document.getElementById('actionButtons').classList.add('hidden');
                }
                
                addMessageToDOM(content, isUser);
                saveChatsToStorage();
                updateChatList();
            }
        }

        function showLoading() {
            const messagesContainer = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            
            const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            icon.setAttribute('class', 'message-icon');
            icon.setAttribute('viewBox', '0 0 100 100');
            icon.innerHTML = '<path d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z"></path>';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = '<span class="loading"></span><span class="loading" style="margin-left: 8px;"></span><span class="loading" style="margin-left: 8px;"></span>';
            
            loadingDiv.appendChild(icon);
            loadingDiv.appendChild(bubble);
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.parentElement.scrollTop = messagesContainer.parentElement.scrollHeight;
        }

        function removeLoading() {
            const loadingDiv = document.getElementById('loadingMessage');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const message = messageInput.value.trim();

            if (!message || !isAuthenticated) return;

            // Add user message
            addMessage(message, true);
            messageInput.value = '';
            sendButton.disabled = true;

            // Show loading
            showLoading();

            try {
                // Call Puter AI with Claude Sonnet
                const response = await puter.ai.chat(message, {
                    model: 'claude-sonnet',
                    stream: true
                });

                removeLoading();
                let fullResponse = '';

                // Stream the response - properly handle the response format
                for await (const part of response) {
                    console.log('Part received:', part); // Debug each part
                    
                    // Handle different response formats
                    if (typeof part === 'string') {
                        fullResponse += part;
                    } else if (part?.type === 'text' && part?.text) {
                        fullResponse += part.text;
                    } else if (part?.text) {
                        fullResponse += part.text;
                    }
                }

                // Debug: log what we received
                console.log('Full concatenated response:', fullResponse);
                console.log('Contains code blocks?', fullResponse.includes('```'));

                addMessage(fullResponse, false);
            } catch (error) {
                removeLoading();
                addMessage(`Error: ${error.message}`, false);
                console.error('Chat error:', error);
            } finally {
                sendButton.disabled = false;
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('claudeChats', JSON.stringify(allChats));
        }

        function loadChatsFromStorage() {
            const saved = localStorage.getItem('claudeChats');
            if (saved) {
                allChats = JSON.parse(saved);
                if (allChats.length > 0) {
                    loadChat(allChats[allChats.length - 1].id);
                } else {
                    startNewChat();
                }
            } else {
                startNewChat();
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already authenticated
            puter.auth.getUser().then(user => {
                if (user) {
                    isAuthenticated = true;
                    showMainInterface();
                    loadChatsFromStorage();
                }
            }).catch(() => {
                // User not authenticated, show login screen
            });

            // Initialize Lucide icons
            lucide.createIcons();
        });

        // Add event listeners after DOM is loaded
        window.addEventListener('load', () => {
            const sendButton = document.getElementById('sendButton');
            const messageInput = document.getElementById('messageInput');
            
            if (sendButton) {
                sendButton.addEventListener('click', sendMessage);
            }
            
            if (messageInput) {
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        });

        // Mobile sidebar toggle
        function toggleMobileSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
    </script>
