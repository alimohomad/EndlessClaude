<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Interface - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #212121;
            color: #e3e3e3;
        }

        .font-serif {
            font-family: 'Source Serif 4', serif;
        }

        /* Sidebar items */
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 7px 12px;
            border-radius: 8px;
            transition: all 0.15s;
            cursor: pointer;
            font-size: 13px;
            color: #b4b4b4;
        }

        .sidebar-item:hover {
            background-color: #2f2f2f;
            color: #ffffff;
        }

        .active-sidebar-item {
            background-color: #2f2f2f;
            color: #ffffff;
        }

        /* Chat styles */
        .chat-input-wrapper {
            background-color: #212121;
            border: 1px solid #3d3d3d;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .action-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #3d3d3d;
            border-radius: 20px;
            font-size: 13px;
            color: #b4b4b4;
            transition: all 0.2s;
            cursor: pointer;
        }

        .action-pill:hover {
            background-color: #2f2f2f;
            border-color: #4d4d4d;
            color: #fff;
        }

        /* Markdown Rendering */
        .prose pre {
            background-color: #1a1a1a !important;
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #333;
            overflow-x: auto;
        }

        .prose code {
            font-family: 'Consolas', monospace;
            background: #333;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose h1, .prose h2, .prose h3 { font-family: 'Source Serif 4', serif; font-weight: 600; color: white; margin-top: 1.5rem; }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        #loginScreen {
            background-color: #171717;
            z-index: 1000;
        }

        /* Animated Sound Wave */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 14px;
        }
        .wave-bar {
            width: 2px;
            background: #666;
            border-radius: 1px;
        }
        .wave-bar:nth-child(1) { height: 6px; }
        .wave-bar:nth-child(2) { height: 12px; }
        .wave-bar:nth-child(3) { height: 8px; }
        .wave-bar:nth-child(4) { height: 10px; }
        .wave-bar:nth-child(5) { height: 4px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8 bg-[#212121] p-10 rounded-3xl border border-[#333] shadow-2xl">
            <div class="flex justify-center">
                <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-[#d97757]">
                    <path d="M50 0L54.4 33.6L85.4 14.6L66.4 45.6L100 50L66.4 54.4L85.4 85.4L54.4 66.4L50 100L45.6 66.4L14.6 85.4L33.6 54.4L0 50L33.6 45.6L14.6 14.6L45.6 33.6L50 0Z" fill="currentColor"/>
                </svg>
            </div>
            <div>
                <h1 class="font-serif text-3xl text-white italic">Welcome to Claude</h1>
                <p class="text-gray-400 mt-2">Sign in with Puter to access your Premium workspace</p>
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-3.5 bg-[#d97757] hover:bg-[#c06548] text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                <span>Sign in with Puter</span>
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[260px] bg-[#171717] flex flex-col h-full border-r border-[#262626] shrink-0 transition-all duration-300">
        <!-- Sidebar Top -->
        <div class="p-4 flex items-center justify-between">
            <h1 id="sidebarLogo" class="font-serif text-[22px] text-white font-semibold tracking-tight">Claude</h1>
            <button onclick="toggleSidebar()" class="p-1.5 hover:bg-[#2f2f2f] rounded-lg transition-colors text-gray-400">
                <i data-lucide="panel-left" class="w-[18px] h-[18px]"></i>
            </button>
        </div>

        <!-- Sidebar Navigation -->
        <div class="px-2 flex flex-col gap-0.5" id="sidebarContent">
            <div onclick="startNewChat()" class="sidebar-item">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="label">New chat</span>
            </div>
            <div class="sidebar-item">
                <i data-lucide="search" class="w-4 h-4"></i>
                <span class="label">Search</span>
            </div>
            <div class="sidebar-item">
                <i data-lucide="settings-2" class="w-4 h-4"></i>
                <span class="label">Customize</span>
            </div>
        </div>

        <div class="px-2 mt-4 flex flex-col gap-0.5" id="navContent">
            <div class="sidebar-item">
                <i data-lucide="message-square" class="w-4 h-4"></i>
                <span class="label">Chats</span>
            </div>
            <div class="sidebar-item">
                <i data-lucide="folder-kanban" class="w-4 h-4"></i>
                <span class="label">Projects</span>
            </div>
            <div class="sidebar-item">
                <i data-lucide="layers" class="w-4 h-4"></i>
                <span class="label">Artifacts</span>
            </div>
        </div>

        <!-- Recents List -->
        <div class="flex-1 overflow-y-auto custom-scroll px-2 mt-4" id="recentsSection">
            <div class="label text-[11px] font-semibold text-gray-500 px-3 mb-2 uppercase tracking-wider">Recents</div>
            <div id="chatHistory" class="space-y-0.5">
                <!-- History items injected here -->
            </div>
        </div>

        <!-- User Profile -->
        <div class="p-3 border-t border-[#262626]">
            <div class="flex items-center justify-between p-1 rounded-lg hover:bg-[#2f2f2f] cursor-pointer transition-colors">
                <div class="flex items-center gap-2.5">
                    <div id="userInit" class="w-8 h-8 rounded-full bg-[#d9d9d1] text-[#171717] flex items-center justify-center font-bold text-sm">R</div>
                    <div class="flex flex-col label overflow-hidden">
                        <span id="userName" class="text-[13px] font-medium text-white leading-tight truncate">raj</span>
                        <span class="text-[11px] text-[#d97757] leading-tight font-medium">Premium plan</span>
                    </div>
                </div>
                <div class="flex items-center gap-1.5 text-gray-500 label">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <i data-lucide="chevrons-up-down" class="w-3 h-3"></i>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-[#212121]">
        
        <!-- Header / History Scroll area -->
        <div id="messageArea" class="flex-1 overflow-y-auto custom-scroll p-6 hidden">
            <div id="messageContainer" class="max-w-3xl mx-auto space-y-8 pb-32">
                <!-- Messages injected here -->
            </div>
        </div>

        <!-- Default Welcome View -->
        <div id="welcomeView" class="flex-1 flex flex-col items-center justify-center -mt-10">
            <!-- Premium Badge -->
            <div class="mb-6 px-3 py-1 bg-[#2f2f2f] rounded-full text-[12px] font-medium text-gray-300 border border-[#3d3d3d]">
                Premium plan
            </div>

            <div class="flex items-center gap-4 mb-10">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-[#d97757]">
                    <path d="M50 0L54.4 33.6L85.4 14.6L66.4 45.6L100 50L66.4 54.4L85.4 85.4L54.4 66.4L50 100L45.6 66.4L14.6 85.4L33.6 54.4L0 50L33.6 45.6L14.6 14.6L45.6 33.6L50 0Z" fill="currentColor"/>
                </svg>
                <h2 class="font-serif text-4xl text-white font-normal">Good afternoon, <span id="welcomeName">raj</span></h2>
            </div>
        </div>

        <!-- Bottom Input Area -->
        <div class="w-full flex flex-col items-center px-4 pb-8 z-10">
            <div class="max-w-[720px] w-full">
                <div class="chat-input-wrapper p-4 pb-3">
                    <textarea 
                        id="chatInput"
                        class="w-full bg-transparent border-none outline-none resize-none text-[16px] text-gray-200 placeholder-gray-500 min-h-[60px]"
                        placeholder="How can I help you today?"
                    ></textarea>
                    
                    <div class="flex items-center justify-between mt-2">
                        <button class="p-1.5 text-gray-500 hover:text-gray-300 transition-colors">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                        
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-1.5 px-2 py-1 hover:bg-[#2f2f2f] rounded text-[13px] text-gray-500 transition-colors cursor-pointer">
                                <span>Sonnet 4.6</span>
                                <i data-lucide="chevron-down" class="w-3 h-3"></i>
                            </div>
                            <!-- Sound Wave Icon from Screenshot -->
                            <div class="wave-container px-1 cursor-pointer hover:opacity-80">
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                            </div>
                            <button id="sendBtn" class="p-1 text-gray-500 hover:text-gray-300 disabled:opacity-30 transition-all">
                                <i data-lucide="circle-arrow-up" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Action Pills -->
                <div id="actionPills" class="flex flex-wrap items-center justify-center gap-2 mt-6">
                    <button onclick="sendPrompt('Write')" class="action-pill"><i data-lucide="pen-line" class="w-4 h-4"></i> Write</button>
                    <button onclick="sendPrompt('Learn')" class="action-pill"><i data-lucide="graduation-cap" class="w-4 h-4"></i> Learn</button>
                    <button onclick="sendPrompt('Code')" class="action-pill"><i data-lucide="code-2" class="w-4 h-4"></i> Code</button>
                    <button onclick="sendPrompt('Life stuff')" class="action-pill"><i data-lucide="coffee" class="w-4 h-4"></i> Life stuff</button>
                    <button onclick="sendPrompt('Claude\'s choice')" class="action-pill"><i data-lucide="sparkles" class="w-4 h-4"></i> Claude's choice</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allChats = JSON.parse(localStorage.getItem('claude_history') || '[]');
        let currentChatId = null;
        let isSidebarCollapsed = false;

        async function init() {
            lucide.createIcons();
            updateGreeting();
            try {
                const user = await puter.auth.getUser();
                if (user) {
                    onAuthenticated(user);
                }
            } catch (e) {
                console.log("Not logged in");
            }
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            const welcomeText = document.querySelector('h2.font-serif');
            let greeting = "Good morning";
            if (hour >= 12 && hour < 17) greeting = "Good afternoon";
            else if (hour >= 17) greeting = "Good evening";
            
            // Re-apply the font-serif class and structure
            welcomeText.innerHTML = `${greeting}, <span id="welcomeName">${document.getElementById('welcomeName').textContent}</span>`;
        }

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = "Authenticating...";
            try {
                await puter.auth.signIn();
                const user = await puter.auth.getUser();
                if (user) onAuthenticated(user);
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = "Sign in with Puter";
                console.error(err);
            }
        }

        function onAuthenticated(user) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('userName').textContent = user.username;
            document.getElementById('welcomeName').textContent = user.username;
            document.getElementById('userInit').textContent = user.username[0].toUpperCase();
            renderHistory();
        }

        function toggleSidebar() {
            isSidebarCollapsed = !isSidebarCollapsed;
            const sidebar = document.getElementById('sidebar');
            const labels = document.querySelectorAll('.label');
            const logo = document.getElementById('sidebarLogo');

            if (isSidebarCollapsed) {
                sidebar.style.width = '68px';
                labels.forEach(l => l.style.display = 'none');
                logo.style.display = 'none';
            } else {
                sidebar.style.width = '260px';
                labels.forEach(l => l.style.display = 'flex');
                logo.style.display = 'block';
            }
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('messageArea').classList.add('hidden');
            document.getElementById('welcomeView').classList.remove('hidden');
            document.getElementById('actionPills').classList.remove('hidden');
            document.getElementById('messageContainer').innerHTML = '';
            document.getElementById('chatInput').value = '';
            renderHistory();
        }

        async function sendMessage(text) {
            const input = text || document.getElementById('chatInput').value.trim();
            if (!input) return;

            if (!currentChatId) {
                currentChatId = Date.now();
                allChats.unshift({ id: currentChatId, title: input, messages: [] });
            }

            document.getElementById('chatInput').value = '';
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('actionPills').classList.add('hidden');
            document.getElementById('messageArea').classList.remove('hidden');

            const chat = allChats.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', content: input });
            renderMessages();

            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const response = await puter.ai.chat(input, { model: 'claude-sonnet', stream: true });
                for await (const part of response) {
                    aiMsg.content += part?.text || '';
                    renderMessages();
                    const area = document.getElementById('messageArea');
                    area.scrollTop = area.scrollHeight;
                }
            } catch (err) {
                aiMsg.content = "I encountered an error connecting to the AI. Please try again.";
                renderMessages();
            } finally {
                sendBtn.disabled = false;
                saveData();
                renderHistory();
            }
        }

        function sendPrompt(type) {
            const prompts = {
                'Write': "Help me write a creative story about a modern-day alchemist.",
                'Learn': "Can you explain the concept of quantum entanglement in simple terms?",
                'Code': "Write a clean Python script for a basic web scraper using BeautifulSoup.",
                'Life stuff': "Give me 5 actionable tips for maintaining a healthy work-life balance.",
                'Claude\'s choice': "Tell me something fascinating about the history of artificial intelligence."
            };
            sendMessage(prompts[type]);
        }

        function renderMessages() {
            const container = document.getElementById('messageContainer');
            const chat = allChats.find(c => c.id === currentChatId);
            if (!chat) return;

            container.innerHTML = chat.messages.map(m => `
                <div class="flex gap-4 ${m.role === 'user' ? 'justify-end' : ''}">
                    ${m.role === 'assistant' ? `
                        <div class="w-8 h-8 rounded-full bg-[#3d3d3d] flex items-center justify-center shrink-0">
                            <svg width="18" height="18" viewBox="0 0 100 100" fill="none" class="text-[#d97757]">
                                <path d="M50 0L54.4 33.6L85.4 14.6L66.4 45.6L100 50L66.4 54.4L85.4 85.4L54.4 66.4L50 100L45.6 66.4L14.6 85.4L33.6 54.4L0 50L33.6 45.6L14.6 14.6L45.6 33.6L50 0Z" fill="currentColor"/>
                            </svg>
                        </div>
                    ` : ''}
                    <div class="prose max-w-full ${m.role === 'user' ? 'bg-[#2f2f2f] text-white p-4 rounded-2xl max-w-[80%]' : 'text-gray-200 flex-1'}">
                        ${marked.parse(m.content)}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        function renderHistory() {
            const container = document.getElementById('chatHistory');
            container.innerHTML = allChats.map(c => `
                <div onclick="loadChat(${c.id})" class="sidebar-item ${c.id === currentChatId ? 'active-sidebar-item' : ''} group">
                    <span class="truncate flex-1">${c.title}</span>
                    <button onclick="deleteChat(event, ${c.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-[#3d3d3d] rounded transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5 text-gray-500"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function loadChat(id) {
            currentChatId = id;
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('actionPills').classList.add('hidden');
            document.getElementById('messageArea').classList.remove('hidden');
            renderMessages();
            renderHistory();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            allChats = allChats.filter(c => c.id !== id);
            if (currentChatId === id) startNewChat();
            saveData();
            renderHistory();
        }

        function saveData() {
            localStorage.setItem('claude_history', JSON.stringify(allChats));
        }

        document.getElementById('sendBtn').onclick = () => sendMessage();
        document.getElementById('chatInput').onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        init();
    </script>
</body>
</html>
